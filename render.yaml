services:
  - type: web
    name: athena-trading-signals
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
