services:
  - type: cron
    name: athena-daily-check
    runtime: python
    plan: starter
    schedule: "0 9,13 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python daily_check.py
    envVars:
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
